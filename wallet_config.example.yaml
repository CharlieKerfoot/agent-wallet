# Agent Wallet Configuration
# CDP credentials can also be set via environment variables:
#   CDP_API_KEY_ID, CDP_API_KEY_SECRET, CDP_WALLET_SECRET

network_id: base-mainnet #base-sepolia for test wallet

# Uncomment to reuse an existing wallet:
# wallet_address: "0x..."

agents:
  # A read-only monitoring agent — can check balance but nothing else
  monitor-bot:
    permissions:
      can_deposit: false
      can_withdraw: false

  # An earning agent that can receive funds into the wallet
  earner-bot:
    permissions:
      can_deposit: true
      can_withdraw: false
      allowed_assets:
        - ETH
        - USDC

  # A spending agent that can send funds, with a per-tx cap
  spender-bot:
    permissions:
      can_deposit: false
      can_withdraw: true
      max_withdraw_per_tx: 0.01
      allowed_assets:
        - ETH

  # A full-access agent (use with caution)
  admin-bot:
    permissions:
      can_deposit: true
      can_withdraw: true
